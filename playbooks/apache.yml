---
- name: Initial Apache setup on RHEL 9 EC2
  hosts: apache
  become: true
  gather_facts: true

  vars:
    apache_service_name: httpd
    apache_pkg_name: httpd
    apache_document_root: /var/www/html
    apache_index_file: /var/www/html/index.html
    apache_test_url: http://ec2-51-20-56-9.eu-north-1.compute.amazonaws.com/

  tasks:
    - name: Install Apache package
      ansible.builtin.dnf:
        name: "{{ apache_pkg_name }}"
        state: present

    - name: Ensure document root exists
      ansible.builtin.file:
        path: "{{ apache_document_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy sample index page
      ansible.builtin.copy:
        dest: "{{ apache_index_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Apache PoC</title>
          </head>
          <body>
              <h1>Apache is running on RHEL 9 EC2</h1>
              <p>This server is prepared for AAP EDA PoC testing.</p>
          </body>
          </html>

    - name: Enable and start Apache service
      ansible.builtin.service:
        name: "{{ apache_service_name }}"
        enabled: true
        state: started

    #- name: Gather service facts
    #  ansible.builtin.service_facts:

    #- name: Open HTTP service in firewalld when firewalld is running
    #  ansible.posix.firewalld:
    #    service: http
    #    permanent: true
    #    state: enabled
    #    immediate: true
    #  when:
    #    - "'firewalld.service' in ansible_facts.services"
    #    - ansible_facts.services['firewalld.service'].state == 'running'

    - name: Wait for Apache port 80 to listen
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 80
        timeout: 30

    - name: Verify Apache homepage locally
      ansible.builtin.uri:
        url: "{{ apache_test_url }}"
        method: GET
        status_code: 200
      register: apache_http_check
      retries: 5
      delay: 3
      until: apache_http_check.status == 200

    - name: Show Apache verification result
      ansible.builtin.debug:
        msg: "Apache setup successful. HTTP status: {{ apache_http_check.status }}"